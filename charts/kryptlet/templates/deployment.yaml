apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kryptlet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kryptlet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kryptlet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kryptlet.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kryptlet
          image: {{ include "kryptlet.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KRYPTLET_ADDR
              value: ":8080"
            - name: KRYPTLET_BLOB_DIR
              value: {{ .Values.blobDir | quote }}
          volumeMounts:
            - name: blobs
              mountPath: {{ .Values.blobDir }}
              readOnly: true
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: blobs
          configMap:
            name: {{ include "kryptlet.fullname" . }}-blobs
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
