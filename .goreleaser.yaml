version: 2
project_name: kryptlet
before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/thereisnotime/kryptlet/internal/version.Version={{.Version}}
      - -X github.com/thereisnotime/kryptlet/internal/version.Commit={{.Commit}}
      - -X github.com/thereisnotime/kryptlet/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --bundle=${artifact}.bundle
      - ${artifact}
      - --yes
    signature: ${artifact}.bundle
    artifacts: checksum

dockers:
  - image_templates:
      - "ghcr.io/thereisnotime/kryptlet:{{ .Tag }}-amd64"
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/thereisnotime/kryptlet"
      - "--label=org.opencontainers.image.licenses=MIT"

  - image_templates:
      - "ghcr.io/thereisnotime/kryptlet:{{ .Tag }}-arm64"
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/thereisnotime/kryptlet"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/thereisnotime/kryptlet:{{ .Tag }}"
    image_templates:
      - "ghcr.io/thereisnotime/kryptlet:{{ .Tag }}-amd64"
      - "ghcr.io/thereisnotime/kryptlet:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/thereisnotime/kryptlet:v{{ .Major }}"
    image_templates:
      - "ghcr.io/thereisnotime/kryptlet:{{ .Tag }}-amd64"
      - "ghcr.io/thereisnotime/kryptlet:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/thereisnotime/kryptlet:latest"
    image_templates:
      - "ghcr.io/thereisnotime/kryptlet:{{ .Tag }}-amd64"
      - "ghcr.io/thereisnotime/kryptlet:{{ .Tag }}-arm64"

sboms:
  - artifacts: archive

changelog:
  use: github
  format: "{{.SHA}}: {{.Message}} (@{{.AuthorUsername}})"
  sort: asc
  filters:
    exclude: ['^docs:', '^test:', '^ci:']

release:
  footer: |
    **Full changelog**: See [CHANGELOG.md](https://github.com/thereisnotime/kryptlet/blob/main/CHANGELOG.md)
